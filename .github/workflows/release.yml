name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build-and-publish:
    if: github.repository == 'mpasternak/django-dbtemplates-iplweb'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/django-dbtemplates-iplweb/
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Check package
        run: uv tool run --with twine twine check dist/*

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
